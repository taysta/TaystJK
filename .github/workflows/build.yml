on:
  workflow_dispatch:
  push:
    branches:
      - cross-compile
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - "docs/*"

jobs:
  linux-to-macos-arm:
    name: Linux to macOS arm64 ${{ matrix.build_type }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release]
        portable: [Non-Portable]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup osxcross
        uses: Timmmm/setup-osxcross@v2
        with:
          osx-version: "12.3"

      - name: Set environment variables
        run: |
          echo "OSXCROSS_ROOT=/home/runner/work/_actions/Timmmm/setup-osxcross/v2/osxcross/target" >> $GITHUB_ENV
          echo "LIBZ_SYS_STATIC=1" >> $GITHUB_ENV
          echo "CC=/home/runner/work/_actions/Timmmm/setup-osxcross/v2/osxcross/target/bin/o64-clang" >> $GITHUB_ENV
          echo "CXX=/home/runner/work/_actions/Timmmm/setup-osxcross/v2/osxcross/target/bin/o64-clang++" >> $GITHUB_ENV

      - name: Download SDL2 Framework for macOS
        run: |
          mkdir -p sdl2_macos
          cd sdl2_macos
          wget https://github.com/libsdl-org/SDL/releases/download/release-2.28.5/SDL2-2.28.5.dmg
          7z x SDL2-2.28.5.dmg
          find . -name "SDL2.framework" -type d
          sudo mkdir -p /home/runner/work/_actions/Timmmm/setup-osxcross/v2/osxcross/target/SDK/MacOSX12.3.sdk/Library/Frameworks/
          sudo cp -R $(find . -name "SDL2.framework" -type d) /home/runner/work/_actions/Timmmm/setup-osxcross/v2/osxcross/target/SDK/MacOSX12.3.sdk/Library/Frameworks/

      - name: Create Build Environment
        run: |
          cmake -E make_directory ${{ github.workspace }}/build
          sudo apt-get update
          sudo apt-get install -y libjpeg-dev libpng-dev zlib1g-dev libsdl2-dev

      - name: Configure CMake
        working-directory: ${{ github.workspace }}/build
        run: |
          SDK_PATH=$(${OSXCROSS_ROOT}/bin/xcrun --sdk macosx --show-sdk-path)
          cmake $GITHUB_WORKSPACE \
            -DCMAKE_SYSTEM_NAME=Darwin \
            -DCMAKE_SYSTEM_PROCESSOR=arm64 \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_SYSROOT=${SDK_PATH} \
            -DCMAKE_FRAMEWORK_PATH=${SDK_PATH}/System/Library/Frameworks \
            -DOPENGL_FOUND=TRUE \
            -DOPENGL_gl_LIBRARY="-framework OpenGL" \
            -DOPENGL_INCLUDE_DIR="${SDK_PATH}/System/Library/Frameworks/OpenGL.framework/Headers" \
            -DSDL2_FOUND=TRUE \
            -DSDL2_LIBRARY="-framework SDL2" \
            -DSDL2_INCLUDE_DIR="${SDK_PATH}/Library/Frameworks/SDL2.framework/Headers" \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install \
            -DUseInternalLibs=ON \
            -DBuildPortableVersion=${{ matrix.portable == 'Portable' && 'ON' || 'OFF' }}

      - name: Build
        working-directory: ${{ github.workspace }}/build
        run: cmake --build . -j $(nproc)

      - name: Install
        working-directory: ${{ github.workspace }}/build
        run: cmake --install .

      - name: Create binary archive
        working-directory: ${{ github.workspace }}/install/JediAcademy
        run: |
          tar -czvf TaystJK-macos-arm64-${{ matrix.build_type }}-${{ matrix.portable }}-cross.tar.gz *

      - uses: actions/upload-artifact@v4
        with:
          name: TaystJK-macos-arm64-${{ matrix.build_type }}-${{ matrix.portable }}-cross
          path: ${{ github.workspace }}/install/JediAcademy/TaystJK-macos-arm64-${{ matrix.build_type }}-${{ matrix.portable }}-cross.tar.gz
          if-no-files-found: error